name: Build penguins-eggs Naked Base Images

on:
  workflow_dispatch:
    inputs:
      distro:
        description: "Distro (debian/ubuntu/devuan/arch/fedora/alpine/void/opensuse/gentoo)"
        required: false
        default: ""
      arch:
        description: "Architecture (amd64/arm64/armhf/riscv64/ppc64el/s390x/loong64/i386)"
        required: false
        default: ""
      release:
        description: "Release (e.g. trixie/noble/rolling/3.21)"
        required: false
        default: ""
      tier:
        description: "Max tier to build (1=stable only, 2=+weekly, 3=all)"
        required: false
        default: "1"
      skip_iso:
        description: "Skip ISO production (stage3 + eggs install only)"
        required: false
        default: "false"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
  schedule:
    # Weekly on Tuesday 03:00 UTC (offset from linux-distro-stage3)
    - cron: "0 3 * * 2"

concurrency:
  group: eggs-stage3-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  matrix:
    name: Generate build matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate matrix
        id: gen
        env:
          INPUT_DISTRO:  ${{ github.event.inputs.distro }}
          INPUT_ARCH:    ${{ github.event.inputs.arch }}
          INPUT_RELEASE: ${{ github.event.inputs.release }}
          INPUT_TIER:    ${{ github.event.inputs.tier || '1' }}
        run: |
          python3 scripts/gen-matrix.py \
            --distro  "${INPUT_DISTRO:-}" \
            --arch    "${INPUT_ARCH:-}" \
            --release "${INPUT_RELEASE:-}" \
            --tier    "${INPUT_TIER:-1}" \
            | tee /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: "${{ matrix.distro }}/${{ matrix.release }}/${{ matrix.arch }}"
    needs: matrix
    runs-on: ubuntu-24.04
    if: ${{ needs.matrix.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Show available disk space
        run: df -h

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support \
            curl git xz-utils zstd \
            squashfs-tools xorriso isolinux syslinux-common mtools rsync

      - name: Register QEMU binfmt handlers
        run: sudo update-binfmts --enable

      - name: Build stage3 + install eggs + produce naked ISO
        env:
          DISTRO:      ${{ matrix.distro }}
          RELEASE:     ${{ matrix.release }}
          ARCH:        ${{ matrix.arch }}
          EGGS_BRANCH: all-features
          SKIP_ISO:    ${{ github.event.inputs.skip_iso == 'true' && '1' || '0' }}
        run: sudo -E ./build-naked.sh --distro "$DISTRO" --release "$RELEASE" --arch "$ARCH"

      - name: Upload stage3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.distro }}-stage3-${{ matrix.release }}-${{ matrix.arch }}"
          path: |
            ${{ matrix.distro }}_stage3_${{ matrix.release }}_${{ matrix.arch }}_*.tar.gz
            ${{ matrix.distro }}_stage3_${{ matrix.release }}_${{ matrix.arch }}_*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload naked ISO artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.skip_iso != 'true' }}
        with:
          name: "${{ matrix.distro }}-naked-${{ matrix.release }}-${{ matrix.arch }}"
          path: |
            ${{ matrix.distro }}-${{ matrix.release }}-${{ matrix.arch }}-naked-*.iso
            ${{ matrix.distro }}-${{ matrix.release }}-${{ matrix.arch }}-naked-*.iso.sha256
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=eggs-stage3-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "name=penguins-eggs Stage3 $(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*.tar.gz,artifacts/*.sha256,artifacts/*.iso"
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          tag: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            penguins-eggs naked base images and stage3 tarballs for all supported distro/arch combinations.

            **Stage3 tarballs** — minimal root filesystems with compiler toolchain + penguins-eggs installed.

            **Naked ISOs** — minimal live ISOs built with `eggs produce --naked`. Boot directly, then use `eggs produce` to create a custom ISO from the running system.

            **Verify integrity:**
            ```
            sha256sum -c {distro}_stage3_{release}_{arch}_{date}.tar.gz.sha256
            sha256sum -c {distro}-{release}-{arch}-naked-{date}.iso.sha256
            ```

            **Use a naked ISO as a base:**
            ```bash
            # Boot the ISO, then customize and remaster:
            sudo eggs produce --prefix my-custom-distro
            ```
          allowUpdates: true
          removeArtifacts: false
